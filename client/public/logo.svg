<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#FF8E53"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7"/>
      <stop offset="100%" style="stop-color:#29B6F6"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- 水滴效果 -->
  <path d="M32 8 C32 8 48 28 48 38 C48 46.6 40.8 52 32 52 C23.2 52 16 46.6 16 38 C16 28 32 8 32 8Z" 
        fill="url(#water)" opacity="0.9"/>
  <!-- 高光 -->
  <ellipse cx="26" cy="32" rx="4" ry="6" fill="white" opacity="0.4"/>
  <!-- 文字：脱水 -->
  <text x="32" y="44" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="system-ui">脱水</text>
</svg>